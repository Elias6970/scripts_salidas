<div class="min-h-screen bg-white dark:bg-gray-900 transition-colors">
  <header class="bg-indigo-600 dark:bg-indigo-800 text-white p-4 shadow-md sticky top-0 z-10">
    <div class="container mx-auto flex justify-between items-center">
      <div class="text-xl font-bold">
        {{ title() }}
      </div>
      <div>
        <label for="config-upload" class="sr-only">Subir archivo de configuración</label>
        <button 
          type="button"
          (click)="configInput.click()"
          [disabled]="isConfigLoading()"
          class="bg-indigo-500 hover:bg-indigo-400 disabled:bg-indigo-400 text-white font-semibold py-1.5 px-4 rounded shadow focus:outline-none focus:ring-2 focus:ring-white transition-colors text-sm flex items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
          </svg>
          {{ isConfigLoading() ? 'Cargando...' : 'Subir Config' }}
        </button>
        <input 
          #configInput
          id="config-upload"
          type="file" 
          accept=".xlsx, .xls"
          (change)="onConfigSelected($event)"
          class="hidden"
        >
      </div>
    </div>
  </header>
  
  <main class="container mx-auto">
    <router-outlet />
  </main>

  @if (successMessage()) {
    <div class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
      <span class="font-medium">{{ successMessage() }}</span>
    </div>
  }
</div>
